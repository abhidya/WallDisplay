<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HDMI Video Player</title>
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #000;
      cursor: none;
    }

    video {
      display: block;
      width: 100vw;
      height: 100vh;
      background: #000;
      object-fit: contain;
    }
  </style>
</head>
<body>
  <video id="player" autoplay muted loop playsinline></video>
  <script>
    const params = new URLSearchParams(window.location.search);
    const sourceUrl = params.get("src") || "";
    const projectorId = params.get("projector_id") || "";
    const player = document.getElementById("player");

    if (sourceUrl) {
      player.src = sourceUrl;
      player.play().catch(() => {});
    }

    async function heartbeat() {
      if (!projectorId) {
        return;
      }
      try {
        await fetch(`/api/renderer/heartbeat/${encodeURIComponent(projectorId)}`, {
          method: "POST",
          keepalive: true,
        });
      } catch (_) {
      }
    }

    heartbeat();
    window.setInterval(heartbeat, 5000);
  </script>
</body>
</html>
