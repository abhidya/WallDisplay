<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation Preview</title>
    <style>
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }

        #preview-host {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }

        .animation-canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
</head>
<body>
    <div id="preview-host"></div>

    <script src="/backend-static/js/projection/animation_engine.js"></script>
    <script src="/backend-static/js/projection/animations/neural_noise.js"></script>
    <script src="/backend-static/js/projection/animations/moving_clouds.js"></script>
    <script src="/backend-static/js/projection/animations/koi_fish.js"></script>
    <script src="/backend-static/js/projection/animations/swimming_fish.js"></script>
    <script src="/backend-static/js/projection/animations/blob_fish.js"></script>
    <script src="/backend-static/js/projection/animations/fish_pond.js"></script>
    <script src="/backend-static/js/projection/animations/koi_pond_8bit.js"></script>
    <script src="/backend-static/js/projection/animations/spectrum_bars.js"></script>
    <script src="/backend-static/js/projection/animations/webgl_flowers.js"></script>
    <script src="/backend-static/js/projection/animations/rainstorm.js"></script>
    <script src="/backend-static/js/projection/animations/pride_spectrum.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const animationId = params.get('animation') || 'neural_noise';
        const host = document.getElementById('preview-host');
        const engine = new AnimationEngine();
        const zone = {
            id: `preview_${animationId}`,
            bounds: {
                x: 0,
                y: 0,
                width: Math.max(1, window.innerWidth),
                height: Math.max(1, window.innerHeight),
            },
            area: Math.max(1, window.innerWidth * window.innerHeight),
        };

        const animation = engine.createAnimation(animationId, zone, host);
        if (animation) {
            animation.start();
            engine.updateData({
                weather: {
                    temperature: 68,
                    humidity: 55,
                    windSpeed: 8,
                    windDirection: 180,
                    conditions: 'Clear',
                },
                transit: {
                    activeRoutes: ['N', 'J', 'KT'],
                    count: 3,
                },
            });
        }
    </script>
</body>
</html>
