        function clearGroupAdvanceTimer(groupId) {
            const timer = mappingMediaAdvanceTimers.get(groupId);
            if (timer) {
                clearTimeout(timer);
                mappingMediaAdvanceTimers.delete(groupId);
            }
        }

        function clearMappingAdvanceTimers() {
            mappingMediaAdvanceTimers.forEach((timer) => clearTimeout(timer));
            mappingMediaAdvanceTimers.clear();
        }

        function markMappingDirty() {
            mappingDirty = true;
        }

        function resetMappingPlaybackState() {
            clearMappingAdvanceTimers();
            stopMappingPlaybackHeartbeat();
            if (mappingAnimationFrame) {
                cancelAnimationFrame(mappingAnimationFrame);
                mappingAnimationFrame = null;
            }
            if (mappingAnimationEngine) {
                mappingAnimationEngine.destroy();
                mappingAnimationEngine = null;
            }
            const animationHost = document.getElementById('mapping-animation-host');
            if (animationHost) {
                animationHost.innerHTML = '';
            }
            animationListCache = new Map();
            mappingMediaCache = new Map();
            mappingMediaState = new Map();
            mappingGroupRenderCache = new Map();
            mappingSharedSourceMeta = new Map();
            mappingSharedSourceFrameCache = new Map();
            mappingSharedAnimationStates = new Map();
            mappingPlaybackSyncBySourceKey = new Map();
            mappingServerTimeOffsetMs = 0;
            mappingRenderableGroups = [];
            mappingCanvasContext = null;
            mappingLastRenderTimestamp = 0;
            mappingRenderFrameToken = 0;
            mappingDirty = true;
        }

        function mulberry32(seed) {
            let state = seed >>> 0;
            return function next() {
                state = (state + 0x6D2B79F5) >>> 0;
                let value = state;
                value = Math.imul(value ^ (value >>> 15), value | 1);
                value ^= value + Math.imul(value ^ (value >>> 7), value | 61);
                return ((value ^ (value >>> 14)) >>> 0) / 4294967296;
            };
        }

        function deterministicShuffleIndices(length, seed) {
            const indices = Array.from({ length }, (_, idx) => idx);
            if (indices.length <= 1) {
                return indices;
            }
            const rand = mulberry32(Number(seed) || 0);
            for (let idx = indices.length - 1; idx > 0; idx -= 1) {
                const swapIdx = Math.floor(rand() * (idx + 1));
                [indices[idx], indices[swapIdx]] = [indices[swapIdx], indices[idx]];
            }
            return indices;
        }

        function getPlaybackSyncNowMs() {
            return Date.now() + mappingServerTimeOffsetMs;
        }

        function getGroupPlaybackSyncKey(group) {
            return group?.playback_sync_key || getGroupSharedSourceKey(group);
        }

        function getPlaybackSyncSnapshot(group) {
            return mappingPlaybackSyncBySourceKey.get(getGroupPlaybackSyncKey(group)) || group?.playback_sync || null;
        }

        function normalizePlaybackSyncSnapshot(payload) {
            const serverNowMs = Number(payload?.server_now_ms || 0);
            if (serverNowMs) {
                mappingServerTimeOffsetMs = serverNowMs - Date.now();
            }
            const nextSnapshots = new Map();
            Object.entries(payload?.sources || {}).forEach(([sourceKey, snapshot]) => {
                nextSnapshots.set(sourceKey, snapshot);
            });
            mappingPlaybackSyncBySourceKey = nextSnapshots;
        }

        async function fetchMappingPlaybackSync() {
            if (!currentConfigId || backgroundType !== 'mapping') {
                return;
            }
            const response = await fetch(`/api/overlay/playback-sync?config_id=${encodeURIComponent(currentConfigId)}`);
            if (!response.ok) {
                throw new Error(`Failed to fetch playback sync (${response.status})`);
            }
            const payload = await response.json();
            normalizePlaybackSyncSnapshot(payload);
            synchronizeMappingGroups();
        }

        function stopMappingPlaybackHeartbeat() {
            if (mappingPlaybackHeartbeatTimer) {
                clearInterval(mappingPlaybackHeartbeatTimer);
                mappingPlaybackHeartbeatTimer = null;
            }
        }

        function startMappingPlaybackHeartbeat() {
            stopMappingPlaybackHeartbeat();
            if (backgroundType !== 'mapping' || !currentConfigId) {
                return;
            }
            mappingPlaybackHeartbeatTimer = window.setInterval(() => {
                fetchMappingPlaybackSync().catch((error) => {
                    console.error('Failed to refresh playback sync:', error);
                });
            }, PLAYBACK_SYNC_POLL_MS);
        }

        function buildDeterministicPlaybackOrder(items, snapshot) {
            const listLength = Array.isArray(items) ? items.length : 0;
            if (!listLength) {
                return [];
            }
            if (!snapshot?.shuffle_enabled) {
                return Array.from({ length: listLength }, (_, idx) => idx);
            }
            return deterministicShuffleIndices(listLength, Number(snapshot.shared_seed) || 0);
        }

        function drawMediaWithTransition(ctx, mediaState, bounds, transform) {
            const currentMedia = mediaState.element;
            const previousMedia = mediaState.previousElement;
            const transitionStart = Number(mediaState.transitionStart || 0);
            const transitionDuration = Math.max(1, Number(mediaState.transitionDuration || MAPPING_IMAGE_CROSSFADE_MS));

            if (!currentMedia) {
                return;
            }

            if (!previousMedia || !transitionStart) {
                drawMediaCover(ctx, currentMedia, bounds, transform);
                return;
            }

            const elapsed = performance.now() - transitionStart;
            const progress = Math.max(0, Math.min(1, elapsed / transitionDuration));

            ctx.save();
            ctx.globalAlpha = 1 - progress;
            drawMediaCover(ctx, previousMedia, bounds, transform);
            ctx.restore();

            ctx.save();
            ctx.globalAlpha = progress;
            drawMediaCover(ctx, currentMedia, bounds, transform);
            ctx.restore();

            if (progress >= 1) {
                mediaState.previousElement = null;
                mediaState.transitionStart = 0;
                mappingMediaState.set(mediaState.groupId, mediaState);
                markMappingDirty();
            }
        }

        function getNextMappingSourceIndex(state, group) {
            if (!state?.sources?.length) {
                return 0;
            }
            if (state.sources.length === 1) {
                return 0;
            }
            if (group.shuffle) {
                let nextIndex = state.currentIndex;
                while (nextIndex === state.currentIndex) {
                    nextIndex = Math.floor(Math.random() * state.sources.length);
                }
                return nextIndex;
            }
            return (state.currentIndex + 1) % state.sources.length;
        }

        function synchronizeMappingGroups() {
            if (!mappingRenderableGroups.length) {
                return;
            }
            mappingRenderableGroups.forEach((group) => {
                const state = mappingMediaState.get(group.id);
                const snapshot = getPlaybackSyncSnapshot(group);
                if (!state || !snapshot) {
                    return;
                }
                if (state.type === 'animation_list') {
                    synchronizeAnimationListState(group, state, snapshot);
                } else if (state.syncManaged) {
                    synchronizeDeterministicMediaState(group, state, snapshot);
                }
            });
        }

        function scheduleManagedAdvanceTimer(groupId, key, delayMs, callback) {
            const timerKey = `${groupId}:${key}`;
            clearGroupAdvanceTimer(timerKey);
            mappingMediaAdvanceTimers.set(
                timerKey,
                window.setTimeout(() => {
                    clearGroupAdvanceTimer(timerKey);
                    callback();
                }, Math.max(0, delayMs))
            );
        }

        function createManagedVideoElement(url) {
            const video = document.createElement('video');
            video.muted = true;
            video.autoplay = true;
            video.playsInline = true;
            video.preload = 'auto';
            video.crossOrigin = 'anonymous';
            video.src = url;
            video.load();
            return video;
        }

        function loadManagedMediaElement(item, offsetMs = 0) {
            return new Promise((resolve, reject) => {
                if (!item?.url) {
                    reject(new Error('Missing media url'));
                    return;
                }
                if (item.kind === 'video') {
                    const video = createManagedVideoElement(item.url);
                    const settleVideo = () => {
                        const durationMs = Number(item.duration_ms || 0);
                        if (durationMs > 0) {
                            const offsetSec = (offsetMs % durationMs) / 1000;
                            if (Number.isFinite(offsetSec)) {
                                try {
                                    video.currentTime = Math.max(0, offsetSec);
                                } catch (error) {
                                    // Ignore early seek failures and continue with loaded data.
                                }
                            }
                        }
                        video.play().catch(() => {});
                        resolve(video);
                    };
                    video.onloadedmetadata = settleVideo;
                    video.onloadeddata = settleVideo;
                    video.onerror = () => reject(new Error(`Failed to load video ${item.url}`));
                    return;
                }

                const image = new Image();
                image.onload = () => resolve(image);
                image.onerror = () => reject(new Error(`Failed to load image ${item.url}`));
                image.src = item.url;
            });
        }

        function commitManagedMediaElement(group, state, token, forceElement = null) {
            if (state.transitionToken !== token) {
                return;
            }
            const preload = forceElement ? { element: forceElement, counter: state.nextCounter, index: state.nextIndex } : state.preloadedLayer;
            if (!preload?.element) {
                return;
            }
            const previousElement = state.element || null;
            state.previousElement = previousElement;
            state.element = preload.element;
            state.currentCounter = preload.counter;
            state.currentIndex = preload.index;
            state.transitionStart = performance.now();
            state.transitionDuration = MAPPING_IMAGE_CROSSFADE_MS;
            state.preloadedLayer = null;
            mappingMediaCache.set(group.id, preload.element);
            mappingMediaState.set(group.id, state);
            markMappingDirty();
        }

        function scheduleManagedMediaPreload(group, state, snapshot, orderedItems) {
            if (!orderedItems.length) {
                return;
            }
            const nowMs = getPlaybackSyncNowMs();
            const nextIndex = Number(snapshot.next_index || 0) % orderedItems.length;
            const nextCounter = Number(snapshot.global_counter || 0) + 1;
            const preloadDelayMs = Math.max(0, Number(snapshot.next_transition_at_ms || nowMs) - nowMs - MAPPING_PRELOAD_LEAD_MS);
            state.nextCounter = nextCounter;
            state.nextIndex = nextIndex;
            state.transitionToken = `${snapshot.generation}:${nextCounter}:${nextIndex}`;
            scheduleManagedAdvanceTimer(group.id, 'preload', preloadDelayMs, () => {
                loadManagedMediaElement(orderedItems[nextIndex], 0)
                    .then((element) => {
                        state.preloadedLayer = {
                            element,
                            counter: nextCounter,
                            index: nextIndex,
                        };
                        mappingMediaState.set(group.id, state);
                    })
                    .catch((error) => {
                        console.error('Failed to preload next media item:', error);
                    });
            });
            scheduleManagedAdvanceTimer(group.id, 'commit', Math.max(0, Number(snapshot.next_transition_at_ms || nowMs) - nowMs), () => {
                if (state.preloadedLayer?.counter === nextCounter) {
                    commitManagedMediaElement(group, state, state.transitionToken);
                } else {
                    loadManagedMediaElement(orderedItems[nextIndex], 0)
                        .then((element) => {
                            commitManagedMediaElement(group, state, state.transitionToken, element);
                        })
                        .catch((error) => {
                            console.error('Failed to commit next media item:', error);
                        });
                }
            });
        }

        function synchronizeDeterministicMediaState(group, state, snapshot) {
            const orderedIndices = buildDeterministicPlaybackOrder(state.items || [], snapshot);
            if (!orderedIndices.length) {
                return;
            }
            const orderedItems = orderedIndices.map((index) => state.items[index]);
            const currentIndex = Number(snapshot.current_index || 0) % orderedItems.length;
            const currentCounter = Number(snapshot.global_counter || 0);
            const offsetMs = Math.max(0, getPlaybackSyncNowMs() - Number(snapshot.item_started_at_ms || getPlaybackSyncNowMs()));
            const activeToken = `${snapshot.generation}:${currentCounter}:${currentIndex}`;

            if (!state.element || state.activeToken !== activeToken) {
                loadManagedMediaElement(orderedItems[currentIndex], offsetMs)
                    .then((element) => {
                        state.previousElement = state.element || null;
                        state.element = element;
                        state.currentCounter = currentCounter;
                        state.currentIndex = currentIndex;
                        state.activeToken = activeToken;
                        state.transitionStart = state.previousElement ? performance.now() : 0;
                        state.transitionDuration = MAPPING_IMAGE_CROSSFADE_MS;
                        mappingMediaCache.set(group.id, element);
                        mappingMediaState.set(group.id, state);
                        markMappingDirty();
                        scheduleManagedMediaPreload(group, state, snapshot, orderedItems);
                    })
                    .catch((error) => {
                        console.error('Failed to sync media item:', error);
                    });
                return;
            }

            if (state.element instanceof HTMLVideoElement) {
                const activeItem = orderedItems[currentIndex] || {};
                const activeDurationMs = Number(activeItem.duration_ms || 0);
                const normalizedOffsetMs = activeDurationMs > 0 ? (offsetMs % activeDurationMs) : offsetMs;
                const desiredTimeSec = Math.max(0, normalizedOffsetMs / 1000);
                if (Math.abs((state.element.currentTime || 0) - desiredTimeSec) > 0.75) {
                    try {
                        state.element.currentTime = desiredTimeSec;
                    } catch (error) {
                        console.warn('Unable to re-seek synced video:', error);
                    }
                }
                state.element.play().catch(() => {});
            }

            scheduleManagedMediaPreload(group, state, snapshot, orderedItems);
        }

        function scheduleImageAdvance(group, state) {
            clearGroupAdvanceTimer(group.id);
            if (!state || state.type !== 'image' || state.sources.length <= 1 || group.auto_advance === false) {
                return;
            }

            const advanceToken = (state.advanceToken || 0) + 1;
            state.advanceToken = advanceToken;
            mappingMediaState.set(group.id, state);

            const timer = setTimeout(() => {
                const activeState = mappingMediaState.get(group.id);
                if (!activeState || activeState.type !== 'image' || activeState.advanceToken !== advanceToken) {
                    return;
                }

                const nextIndex = getNextMappingSourceIndex(activeState, group);
                const nextImage = new Image();
                nextImage.onload = () => {
                    const latestState = mappingMediaState.get(group.id);
                    if (!latestState || latestState.type !== 'image' || latestState.advanceToken !== advanceToken) {
                        return;
                    }
                    latestState.previousElement = latestState.element || null;
                    latestState.element = nextImage;
                    latestState.currentIndex = nextIndex;
                    latestState.transitionStart = performance.now();
                    latestState.transitionDuration = MAPPING_IMAGE_CROSSFADE_MS;
                    mappingMediaCache.set(group.id, nextImage);
                    mappingMediaState.set(group.id, latestState);
                    markMappingDirty();
                    scheduleImageAdvance(group, latestState);
                };
                nextImage.onerror = () => {
                    scheduleImageAdvance(group, activeState);
                };
                nextImage.src = activeState.sources[nextIndex];
            }, MAPPING_IMAGE_ADVANCE_MS);

            mappingMediaAdvanceTimers.set(group.id, timer);
        }

        async function initializeMappingScene(scene) {
            document.getElementById('video-container').style.display = 'none';
            document.getElementById('mapping-container').style.display = 'block';
            const canvas = document.getElementById('mapping-canvas');
            canvas.width = scene.canvas_width || 1280;
            canvas.height = scene.canvas_height || 720;
            resetMappingPlaybackState();
            mappingCanvasContext = canvas.getContext('2d');
            mappingAnimationEngine = new AnimationEngine();
            await Promise.all((scene.masks || []).map(loadMappingMask));
            prepareMappingGroupRenderCaches(scene, canvas.width, canvas.height);
            await Promise.all((scene.groups || []).map(loadGroupMedia));
            if (mappingAnimationEngine && (latestMappingWeather || latestMappingTransit)) {
                mappingAnimationEngine.updateData({
                    weather: latestMappingWeather,
                    transit: latestMappingTransit,
                });
            }
            markMappingDirty();
            startMappingRenderLoop();
        }

        function getGroupMaskImages(group) {
            return (group.mask_ids || []).map(maskId => mappingMaskCache.get(maskId)).filter(Boolean);
        }

        function mergeBounds(a, b) {
            const minX = Math.min(a.x, b.x);
            const minY = Math.min(a.y, b.y);
            const maxX = Math.max(a.x + a.width, b.x + b.width);
            const maxY = Math.max(a.y + a.height, b.y + b.height);
            return {
                x: minX,
                y: minY,
                width: Math.max(1, maxX - minX),
                height: Math.max(1, maxY - minY),
            };
        }

        function getGroupSharedSourceKey(group) {
            const bindingType = (group.media_binding_type || '').toLowerCase();
            if (bindingType === 'animation' && group.animation_id) {
                return `animation:${group.animation_id}`;
            }
            if (bindingType === 'animation_list' && group.animation_list_id) {
                return `animation_list:${group.animation_list_id}`;
            }
            const mediaSources = Array.isArray(group.media_urls) && group.media_urls.length
                ? group.media_urls
                : (group.media_url ? [group.media_url] : []);
            if (mediaSources.length) {
                return `${bindingType}:${mediaSources.join('|')}`;
            }
            return `${bindingType}:group:${group.id}`;
        }

        function getPreparedSceneCacheKey(scene, canvasWidth, canvasHeight) {
            const visibleGroups = (scene?.groups || [])
                .filter(group => group.visible !== false && group.mask_ids && group.mask_ids.length)
                .map((group) => ({
                    id: group.id,
                    masks: [...(group.mask_ids || [])].sort((a, b) => String(a).localeCompare(String(b))),
                }));
            return JSON.stringify({
                sceneId: scene?.id || 'none',
                canvasWidth,
                canvasHeight,
                groups: visibleGroups,
            });
        }

        function applySharedSourceState(sourceKey, state) {
            const sharedMeta = mappingSharedSourceMeta.get(sourceKey);
            const groupIds = sharedMeta?.groupIds || [];
            groupIds.forEach((groupId) => {
                mappingMediaCache.set(groupId, state.element);
                mappingMediaState.set(groupId, state);
            });
        }

        function buildCombinedMaskCanvas(maskImages, width, height) {
            const maskCanvas = document.createElement('canvas');
            maskCanvas.width = width;
            maskCanvas.height = height;
            const maskCtx = maskCanvas.getContext('2d', { willReadFrequently: true });
            const combinedImageData = maskCtx.createImageData(width, height);
            const combinedPixels = combinedImageData.data;

            maskImages.forEach((image) => {
                maskCtx.clearRect(0, 0, width, height);
                maskCtx.drawImage(image, 0, 0, width, height);
                const { data } = maskCtx.getImageData(0, 0, width, height);

                for (let i = 0; i < data.length; i += 4) {
                    const alpha = data[i + 3];
                    if (alpha <= 5) {
                        continue;
                    }

                    const lum = (data[i] + data[i + 1] + data[i + 2]) / 3;
                    if (lum > combinedPixels[i + 3]) {
                        combinedPixels[i] = 255;
                        combinedPixels[i + 1] = 255;
                        combinedPixels[i + 2] = 255;
                        combinedPixels[i + 3] = lum > 127 ? 255 : 0;
                    }
                }
            });

            maskCtx.putImageData(combinedImageData, 0, 0);
            return maskCanvas;
        }

        function cropMaskCanvasToBounds(maskCanvas, bounds) {
            const cropped = document.createElement('canvas');
            cropped.width = Math.max(1, Math.round(bounds.width));
            cropped.height = Math.max(1, Math.round(bounds.height));
            const croppedCtx = cropped.getContext('2d');
            croppedCtx.drawImage(
                maskCanvas,
                bounds.x,
                bounds.y,
                bounds.width,
                bounds.height,
                0,
                0,
                bounds.width,
                bounds.height,
            );
            return cropped;
        }

        function prepareMappingGroupRenderCaches(scene, canvasWidth, canvasHeight) {
            mappingGroupRenderCache = new Map();
            mappingSharedSourceMeta = new Map();
            mappingRenderableGroups = (scene.groups || [])
                .filter(group => group.visible !== false && group.mask_ids && group.mask_ids.length)
                .sort((a, b) => (a.z_index || 0) - (b.z_index || 0));

            const sceneCacheKey = getPreparedSceneCacheKey(scene, canvasWidth, canvasHeight);
            const cachedSceneTemplates = mappingPreparedSceneCache.get(sceneCacheKey);
            const sceneTemplates = new Map();
            if (cachedSceneTemplates) {
                cachedSceneTemplates.forEach((template) => {
                    sceneTemplates.set(template.groupId, template);
                });
            }

            mappingRenderableGroups.forEach((group) => {
                const maskImages = getGroupMaskImages(group);
                if (!maskImages.length) {
                    return;
                }

                const sourceKey = getGroupSharedSourceKey(group);
                const cachedTemplate = sceneTemplates.get(group.id);
                const maskBounds = cachedTemplate?.bounds || computeMaskBounds(maskImages, canvasWidth, canvasHeight);
                const maskCanvas = cachedTemplate?.maskCanvas || buildCombinedMaskCanvas(maskImages, canvasWidth, canvasHeight);
                const sharedMeta = mappingSharedSourceMeta.get(sourceKey);
                if (sharedMeta) {
                    sharedMeta.bounds = mergeBounds(sharedMeta.bounds, maskBounds);
                    sharedMeta.groupIds.push(group.id);
                } else {
                    mappingSharedSourceMeta.set(sourceKey, {
                        sourceKey,
                        bounds: maskBounds,
                        groupIds: [group.id],
                    });
                }

                mappingGroupRenderCache.set(group.id, {
                    maskImages,
                    bounds: maskBounds,
                    sourceBounds: maskBounds,
                    sourceKey,
                    groupCanvas: null,
                    groupCtx: null,
                    fullMaskCanvas: maskCanvas,
                    maskCanvas: null,
                    staticLayerCanvas: null,
                    staticLayerCtx: null,
                    staticLayerKey: '',
                });
            });

            mappingGroupRenderCache.forEach((renderCache) => {
                const sharedMeta = mappingSharedSourceMeta.get(renderCache.sourceKey);
                if (sharedMeta?.bounds) {
                    renderCache.sourceBounds = sharedMeta.bounds;
                }
                renderCache.maskCanvas = cropMaskCanvasToBounds(renderCache.fullMaskCanvas, renderCache.bounds);
            });
            mappingPreparedSceneCache.set(
                sceneCacheKey,
                mappingRenderableGroups
                    .map((group) => {
                        const renderCache = mappingGroupRenderCache.get(group.id);
                        if (!renderCache) {
                            return null;
                        }
                        return {
                            groupId: group.id,
                            bounds: renderCache.bounds,
                            maskCanvas: renderCache.maskCanvas,
                        };
                    })
                    .filter(Boolean),
            );
            markMappingDirty();
        }

        async function fetchAnimationList(animationListId) {
            if (!animationListId) {
                return null;
            }
            if (animationListCache.has(animationListId)) {
                return animationListCache.get(animationListId);
            }
            const response = await fetch(`/api/projection/animation-lists/${encodeURIComponent(animationListId)}`);
            if (!response.ok) {
                throw new Error(`Failed to load animation list ${animationListId}`);
            }
            const payload = await response.json();
            animationListCache.set(animationListId, payload);
            return payload;
        }

        function clearAnimationGroupState(groupId) {
            const existingState = mappingMediaState.get(groupId);
            if (existingState?.animation?.stop) {
                existingState.animation.stop();
            }
            if (existingState?.container?.remove) {
                existingState.container.remove();
            }
            clearMappingAdvanceTimer(groupId);
        }

        function createAnimationMediaState(group, animationId, bounds, sourceKey = null) {
            if (!mappingAnimationEngine || !animationId) {
                return null;
            }

            const host = document.getElementById('mapping-animation-host');
            const container = document.createElement('div');
            container.style.position = 'absolute';
            container.style.left = '-10000px';
            container.style.top = '-10000px';
            container.style.width = `${Math.max(1, bounds.width)}px`;
            container.style.height = `${Math.max(1, bounds.height)}px`;
            host.appendChild(container);

            const zone = {
                id: group.id,
                bounds: {
                    x: 0,
                    y: 0,
                    width: Math.max(1, bounds.width),
                    height: Math.max(1, bounds.height),
                },
                area: Math.max(1, bounds.width * bounds.height),
            };
            const animation = mappingAnimationEngine.createAnimation(animationId, zone, container);
            if (!animation) {
                container.remove();
                return null;
            }
            animation.start();
            markMappingDirty();
            return {
                groupId: group.id,
                sourceKey,
                type: 'animation',
                element: animation.canvas,
                animation,
                container,
                animationId,
            };
        }

        function preloadAnimationMediaState(group, animationId, bounds, sourceKey = null) {
            return Promise.resolve(createAnimationMediaState(group, animationId, bounds, sourceKey));
        }

        function scheduleAnimationListPreload(group, state, snapshot, orderedAnimationIds, bounds) {
            if (!orderedAnimationIds.length) {
                return;
            }
            const nowMs = getPlaybackSyncNowMs();
            const nextIndex = Number(snapshot.next_index || 0) % orderedAnimationIds.length;
            const nextCounter = Number(snapshot.global_counter || 0) + 1;
            state.nextCounter = nextCounter;
            state.nextIndex = nextIndex;
            state.transitionToken = `${snapshot.generation}:${nextCounter}:${nextIndex}`;
            const preloadDelayMs = Math.max(0, Number(snapshot.next_transition_at_ms || nowMs) - nowMs - MAPPING_PRELOAD_LEAD_MS);
            scheduleManagedAdvanceTimer(group.id, 'anim-preload', preloadDelayMs, () => {
                preloadAnimationMediaState(group, orderedAnimationIds[nextIndex], bounds, state.sourceKey || null)
                    .then((nextState) => {
                        if (!nextState) {
                            return;
                        }
                        state.preloadedLayer = {
                            state: nextState,
                            counter: nextCounter,
                            index: nextIndex,
                        };
                        mappingMediaState.set(group.id, state);
                    })
                    .catch((error) => {
                        console.error('Failed to preload animation list item:', error);
                    });
            });
            scheduleManagedAdvanceTimer(group.id, 'anim-commit', Math.max(0, Number(snapshot.next_transition_at_ms || nowMs) - nowMs), () => {
                const preload = state.preloadedLayer;
                if (!preload?.state) {
                    return;
                }
                clearAnimationGroupState(group.id);
                const previousElement = state.element || null;
                state.previousElement = previousElement;
                state.element = preload.state.element;
                state.animation = preload.state.animation;
                state.container = preload.state.container;
                state.animationId = preload.state.animationId;
                state.currentCounter = preload.counter;
                state.currentIndex = preload.index;
                state.activeToken = state.transitionToken;
                state.transitionStart = previousElement ? performance.now() : 0;
                state.transitionDuration = MAPPING_IMAGE_CROSSFADE_MS;
                state.preloadedLayer = null;
                mappingMediaCache.set(group.id, state.element);
                mappingMediaState.set(group.id, state);
                if (state.sourceKey) {
                    mappingSharedAnimationStates.set(state.sourceKey, {
                        ownerGroupId: group.id,
                        state,
                    });
                    applySharedSourceState(state.sourceKey, state);
                }
                markMappingDirty();
            });
        }

        function synchronizeAnimationListState(group, state, snapshot) {
            const animationIds = Array.isArray(state.animationIds) ? state.animationIds : [];
            if (!animationIds.length) {
                return;
            }
            const orderedIndices = buildDeterministicPlaybackOrder(
                animationIds.map((animationId) => ({ animationId })),
                snapshot
            );
            const orderedAnimationIds = orderedIndices.map((index) => animationIds[index]);
            const currentIndex = Number(snapshot.current_index || 0) % orderedAnimationIds.length;
            const currentCounter = Number(snapshot.global_counter || 0);
            const activeToken = `${snapshot.generation}:${currentCounter}:${currentIndex}`;
            const renderCache = mappingGroupRenderCache.get(group.id);
            const bounds = renderCache?.bounds || { x: 0, y: 0, width: 1, height: 1 };

            if (!state.element || state.activeToken !== activeToken || state.animationId !== orderedAnimationIds[currentIndex]) {
                const nextState = createAnimationMediaState(group, orderedAnimationIds[currentIndex], bounds, state.sourceKey || null);
                if (!nextState) {
                    return;
                }
                clearAnimationGroupState(group.id);
                state.previousElement = state.element || null;
                state.element = nextState.element;
                state.animation = nextState.animation;
                state.container = nextState.container;
                state.animationId = nextState.animationId;
                state.currentCounter = currentCounter;
                state.currentIndex = currentIndex;
                state.activeToken = activeToken;
                state.transitionStart = state.previousElement ? performance.now() : 0;
                state.transitionDuration = MAPPING_IMAGE_CROSSFADE_MS;
                mappingMediaCache.set(group.id, state.element);
                mappingMediaState.set(group.id, state);
                if (state.sourceKey) {
                    mappingSharedAnimationStates.set(state.sourceKey, {
                        ownerGroupId: group.id,
                        state,
                    });
                    applySharedSourceState(state.sourceKey, state);
                }
                markMappingDirty();
            }

            scheduleAnimationListPreload(group, state, snapshot, orderedAnimationIds, bounds);
        }

        function scheduleAnimationListAdvance(group, bounds, animationList) {
            const currentState = mappingMediaState.get(group.id);
            if (!currentState || currentState.type !== 'animation_list') {
                return;
            }
            if ((animationList.animation_ids || []).length <= 1 || group.auto_advance === false) {
                return;
            }

            const delayMs = Math.max(3000, Number(animationList.auto_advance_seconds || 12) * 1000);
            const timerId = window.setTimeout(() => {
                const latestState = mappingMediaState.get(group.id);
                if (!latestState || latestState.type !== 'animation_list') {
                    return;
                }
                const ids = animationList.animation_ids || [];
                let nextIndex;
                if (animationList.shuffle && ids.length > 1) {
                    nextIndex = latestState.currentIndex;
                    while (nextIndex === latestState.currentIndex) {
                        nextIndex = Math.floor(Math.random() * ids.length);
                    }
                } else {
                    nextIndex = (latestState.currentIndex + 1) % ids.length;
                }
                const nextBaseState = createAnimationMediaState(group, ids[nextIndex], bounds, latestState.sourceKey || null);
                if (!nextBaseState) {
                    scheduleAnimationListAdvance(group, bounds, animationList);
                    return;
                }

                clearAnimationGroupState(group.id);
                const nextState = {
                    ...nextBaseState,
                    type: 'animation_list',
                    sourceKey: latestState.sourceKey || null,
                    listId: animationList.id,
                    currentIndex: nextIndex,
                    animationIds: ids,
                };
                if (nextState.sourceKey) {
                    mappingSharedAnimationStates.set(nextState.sourceKey, {
                        ownerGroupId: group.id,
                        state: nextState,
                    });
                    applySharedSourceState(nextState.sourceKey, nextState);
                } else {
                    mappingMediaCache.set(group.id, nextBaseState.element);
                    mappingMediaState.set(group.id, nextState);
                }
                scheduleAnimationListAdvance(group, bounds, animationList);
            }, delayMs);
            mappingMediaAdvanceTimers.set(group.id, timerId);
        }

        function loadMappingMask(mask) {
            if (mappingMaskCache.has(mask.id)) {
                return Promise.resolve();
            }
            if (mappingMaskCacheByUrl.has(mask.url)) {
                mappingMaskCache.set(mask.id, mappingMaskCacheByUrl.get(mask.url));
                return Promise.resolve();
            }
            if (mappingMaskLoadPromises.has(mask.id)) {
                return mappingMaskLoadPromises.get(mask.id);
            }
            const promise = new Promise((resolve) => {
                const image = new Image();
                image.onload = () => {
                    mappingMaskCache.set(mask.id, image);
                    mappingMaskCacheByUrl.set(mask.url, image);
                    mappingMaskLoadPromises.delete(mask.id);
                    resolve();
                };
                image.onerror = () => {
                    mappingMaskLoadPromises.delete(mask.id);
                    resolve();
                };
                image.src = mask.url;
            });
            mappingMaskLoadPromises.set(mask.id, promise);
            return promise;
        }

        function loadGroupMedia(group) {
            const bindingType = (group.media_binding_type || '').toLowerCase();
            if (bindingType === 'animation_list' && group.animation_list_id) {
                return new Promise((resolve) => {
                    if (!mappingAnimationEngine) {
                        resolve();
                        return;
                    }

                    const canvas = document.getElementById('mapping-canvas');
                    const renderCache = mappingGroupRenderCache.get(group.id);
                    const sourceKey = renderCache?.sourceKey || getGroupSharedSourceKey(group);
                    const maskImages = renderCache?.maskImages || getGroupMaskImages(group);
                    if (!canvas || !maskImages.length) {
                        resolve();
                        return;
                    }

                    const sharedState = mappingSharedAnimationStates.get(sourceKey);
                    if (sharedState?.state) {
                        applySharedSourceState(sourceKey, sharedState.state);
                        resolve();
                        return;
                    }

                    const bounds = renderCache?.bounds || computeMaskBounds(maskImages, canvas.width, canvas.height);
                    fetchAnimationList(group.animation_list_id).then(async (animationList) => {
                        const animationIds = animationList?.animation_ids || [];
                        if (!animationIds.length) {
                            resolve();
                            return;
                        }
                        await Promise.all(animationIds.map((animationId) => ensureAnimationScriptLoaded(animationId)));
                        const syncSnapshot = getPlaybackSyncSnapshot(group) || group.playback_sync || null;
                        const orderedIndices = buildDeterministicPlaybackOrder(
                            animationIds.map((animationId) => ({ animationId })),
                            syncSnapshot || { shuffle_enabled: Boolean(animationList?.shuffle), shared_seed: 0 }
                        );
                        const orderedAnimationIds = orderedIndices.map((index) => animationIds[index]);
                        const initialIndex = syncSnapshot ? Number(syncSnapshot.current_index || 0) % orderedAnimationIds.length : 0;
                        const baseState = createAnimationMediaState(group, orderedAnimationIds[initialIndex], bounds, sourceKey);
                        if (!baseState) {
                            resolve();
                            return;
                        }
                        const state = {
                            ...baseState,
                            type: 'animation_list',
                            sourceKey,
                            listId: animationList.id,
                            currentIndex: initialIndex,
                            currentCounter: syncSnapshot ? Number(syncSnapshot.global_counter || 0) : 0,
                            animationIds,
                            activeToken: syncSnapshot ? `${syncSnapshot.generation}:${syncSnapshot.global_counter}:${initialIndex}` : null,
                            preloadedLayer: null,
                        };
                    mappingSharedAnimationStates.set(sourceKey, {
                        ownerGroupId: group.id,
                        state,
                    });
                    applySharedSourceState(sourceKey, state);
                    markMappingDirty();
                    if (syncSnapshot) {
                        synchronizeAnimationListState(group, state, syncSnapshot);
                    } else {
                        scheduleAnimationListAdvance(group, bounds, animationList);
                    }
                    resolve();
                    }).catch((error) => {
                        console.error(error);
                        resolve();
                    });
                });
            }
            if (bindingType === 'animation' && group.animation_id) {
                return new Promise((resolve) => {
                    if (!mappingAnimationEngine) {
                        resolve();
                        return;
                    }

                    const canvas = document.getElementById('mapping-canvas');
                    const renderCache = mappingGroupRenderCache.get(group.id);
                    const sourceKey = renderCache?.sourceKey || getGroupSharedSourceKey(group);
                    const maskImages = renderCache?.maskImages || getGroupMaskImages(group);
                    if (!canvas || !maskImages.length) {
                        resolve();
                        return;
                    }

                    const sharedState = mappingSharedAnimationStates.get(sourceKey);
                    if (sharedState?.state) {
                        applySharedSourceState(sourceKey, sharedState.state);
                        resolve();
                        return;
                    }

                    const bounds = renderCache?.bounds || computeMaskBounds(maskImages, canvas.width, canvas.height);
                    ensureAnimationScriptLoaded(group.animation_id).then(() => {
                    const state = createAnimationMediaState(group, group.animation_id, bounds, sourceKey);
                    if (!state) {
                        resolve();
                        return;
                    }
                    mappingSharedAnimationStates.set(sourceKey, {
                        ownerGroupId: group.id,
                        state,
                    });
                    applySharedSourceState(sourceKey, state);
                    markMappingDirty();
                    resolve();
                }).catch((error) => {
                        console.error(error);
                        resolve();
                    });
                });
            }

            const mediaItems = Array.isArray(group.media_items) && group.media_items.length
                ? group.media_items
                : ((Array.isArray(group.media_urls) && group.media_urls.length
                    ? group.media_urls
                    : (group.media_url ? [group.media_url] : []))
                    .map((url) => ({
                        url,
                        kind: /\.(png|jpe?g|gif|webp|bmp|svg)(\?|$)/i.test(url || '') ? 'image' : 'video',
                        duration_ms: null,
                    })));
            if (!mediaItems.length) return Promise.resolve();
            const syncSnapshot = getPlaybackSyncSnapshot(group) || group.playback_sync || null;
            if (syncSnapshot) {
                const state = {
                    groupId: group.id,
                    sourceKey: getGroupPlaybackSyncKey(group),
                    type: mediaItems.some((item) => item.kind === 'video') ? 'video' : 'image',
                    items: mediaItems,
                    element: null,
                    previousElement: null,
                    currentIndex: -1,
                    currentCounter: -1,
                    activeToken: null,
                    preloadedLayer: null,
                    transitionStart: 0,
                    transitionDuration: MAPPING_IMAGE_CROSSFADE_MS,
                    syncManaged: true,
                    lastFrameCanvas: null,
                    lastFrameCtx: null,
                };
                mappingMediaState.set(group.id, state);
                synchronizeDeterministicMediaState(group, state, syncSnapshot);
                return Promise.resolve();
            }

            const mediaSources = mediaItems.map((item) => item.url);
            return new Promise((resolve) => {
                const currentIndex = 0;
                const currentUrl = mediaSources[currentIndex];
                const isImageBinding = bindingType === 'photo' || bindingType === 'photo_list';
                const isImage = isImageBinding || /\.(png|jpe?g|gif|webp|bmp|svg)(\?|$)/i.test(currentUrl);
                if (isImage) {
                    const image = new Image();
                    image.onload = () => {
                    const state = {
                        groupId: group.id,
                        element: image,
                        previousElement: null,
                        sources: mediaSources,
                        currentIndex,
                        type: 'image',
                        transitionStart: 0,
                        transitionDuration: MAPPING_IMAGE_CROSSFADE_MS,
                    };
                    mappingMediaCache.set(group.id, image);
                    mappingMediaState.set(group.id, state);
                    markMappingDirty();
                    scheduleImageAdvance(group, state);
                    resolve();
                    };
                    image.onerror = resolve;
                    image.src = currentUrl;
                    return;
                }

                const video = document.createElement('video');
                video.muted = true;
                video.autoplay = true;
                video.playsInline = true;
                video.preload = 'auto';
                const state = {
                    element: video,
                    sources: mediaSources,
                    currentIndex,
                    type: 'video',
                    holdUntil: 0,
                    pendingAdvance: false,
                    lastFrameCanvas: null,
                    lastFrameCtx: null,
                };
                let resolved = false;

                const updateMinimumHold = () => {
                    const duration = Number(video.duration);
                    if (Number.isFinite(duration) && duration > 0 && duration < MIN_MAPPING_CLIP_SECONDS && state.sources.length > 1) {
                        state.holdUntil = Date.now() + (MIN_MAPPING_CLIP_SECONDS * 1000);
                    } else {
                        state.holdUntil = 0;
                    }
                };

                const handleVideoEnded = () => {
                    const state = mappingMediaState.get(group.id);
                    if (!state || state.sources.length <= 1) return;
                    if (state.holdUntil && Date.now() < state.holdUntil) {
                        const currentVideo = state.element;
                        currentVideo.currentTime = 0;
                        currentVideo.play().catch(() => {});
                        return;
                    }
                    const nextIndex = (state.currentIndex + 1) % state.sources.length;
                    queueNextVideo(nextIndex);
                };

                const handleVideoError = () => {
                    if (!resolved) {
                        resolved = true;
                        resolve();
                    }
                };

                const attachVideoHandlers = (targetVideo) => {
                    targetVideo.onended = handleVideoEnded;
                    targetVideo.onerror = handleVideoError;
                };

                const swapToLoadedVideo = (loadedVideo, nextIndex) => {
                    state.currentIndex = nextIndex;
                    state.element = loadedVideo;
                    state.pendingAdvance = false;
                    mappingMediaCache.set(group.id, loadedVideo);
                    mappingMediaState.set(group.id, state);
                    loadedVideo.play().catch(() => {});
                };

                const queueNextVideo = (nextIndex) => {
                    if (state.pendingAdvance) {
                        return;
                    }

                    state.pendingAdvance = true;
                    const nextVideo = document.createElement('video');
                    nextVideo.muted = true;
                    nextVideo.autoplay = true;
                    nextVideo.playsInline = true;
                    nextVideo.preload = 'auto';
                    nextVideo.loop = state.sources.length === 1;
                    attachVideoHandlers(nextVideo);

                    nextVideo.onloadeddata = () => {
                        updateVideoTimingState(nextVideo, state, nextIndex);
                        swapToLoadedVideo(nextVideo, nextIndex);
                    };
                    nextVideo.onerror = () => {
                        state.pendingAdvance = false;
                        handleVideoError();
                    };

                    nextVideo.src = state.sources[nextIndex];
                    nextVideo.load();
                };

                const updateVideoTimingState = (targetVideo, targetState, nextIndex) => {
                    targetState.currentIndex = nextIndex;
                    const duration = Number(targetVideo.duration);
                    if (Number.isFinite(duration) && duration > 0 && duration < MIN_MAPPING_CLIP_SECONDS && targetState.sources.length > 1) {
                        targetState.holdUntil = Date.now() + (MIN_MAPPING_CLIP_SECONDS * 1000);
                    } else {
                        targetState.holdUntil = 0;
                    }
                };

                const applyVideoSource = (nextIndex) => {
                    state.currentIndex = nextIndex;
                    video.loop = state.sources.length === 1;
                    video.src = state.sources[nextIndex];
                    video.load();
                };

                video.onloadeddata = () => {
                    mappingMediaCache.set(group.id, video);
                    updateMinimumHold();
                    mappingMediaState.set(group.id, state);
                    markMappingDirty();
                    video.play().catch(() => {});
                    if (!resolved) {
                        resolved = true;
                        resolve();
                    }
                };
                attachVideoHandlers(video);
                applyVideoSource(currentIndex);
            });
        }

        function startMappingRenderLoop() {
            if (mappingAnimationFrame) {
                cancelAnimationFrame(mappingAnimationFrame);
            }
            mappingLastRenderTimestamp = 0;
            const loop = (timestamp) => {
                const targetFrameMs = getMappingTargetFrameMs();
                if (!mappingLastRenderTimestamp || (timestamp - mappingLastRenderTimestamp) >= targetFrameMs) {
                    mappingLastRenderTimestamp = timestamp;
                    if (mappingDirty || mappingSceneNeedsContinuousRender()) {
                        renderMappingScene();
                        mappingDirty = false;
                    }
                }
                mappingAnimationFrame = requestAnimationFrame(loop);
            };
            mappingAnimationFrame = requestAnimationFrame(loop);
        }

        function getMappingTargetFrameMs() {
            if (document.visibilityState === 'hidden') {
                return MAPPING_HIDDEN_TARGET_FRAME_MS;
            }

            let animatedGroupCount = 0;
            mappingRenderableGroups.forEach((group) => {
                const mediaState = mappingMediaState.get(group.id);
                if (mediaState && ['video', 'animation', 'animation_list'].includes(mediaState.type)) {
                    animatedGroupCount += 1;
                }
            });

            if (animatedGroupCount >= 10) {
                return MAPPING_HEAVY_TARGET_FRAME_MS;
            }
            if (animatedGroupCount >= 6) {
                return MAPPING_MEDIUM_TARGET_FRAME_MS;
            }
            return MAPPING_TARGET_FRAME_MS;
        }

        function mappingSceneNeedsContinuousRender() {
            return mappingRenderableGroups.some((group) => {
                const mediaState = mappingMediaState.get(group.id);
                if (!mediaState) {
                    return false;
                }
                if (mediaState.type === 'video' || mediaState.type === 'animation' || mediaState.type === 'animation_list') {
                    return true;
                }
                return mediaState.type === 'image' && Boolean(mediaState.previousElement || mediaState.transitionStart);
            });
        }

        function renderMappingScene() {
            if (!mappingScene) return;
            const canvas = document.getElementById('mapping-canvas');
            const ctx = mappingCanvasContext || canvas.getContext('2d');
            mappingRenderFrameToken += 1;
            if (mappingAnimationEngine?.renderFrame) {
                mappingAnimationEngine.renderFrame(performance.now());
            }
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            mappingRenderableGroups.forEach(group => drawMappingGroup(ctx, group, canvas.width, canvas.height));
        }

        function renderSharedSourceLayer(sourceKey, sourceBounds, media, group, mediaState) {
            if (!sourceKey || !media || !sourceBounds) {
                return null;
            }

            const width = Math.max(1, Math.round(sourceBounds.width));
            const height = Math.max(1, Math.round(sourceBounds.height));
            let layer = mappingSharedSourceFrameCache.get(sourceKey);
            if (!layer) {
                const canvas = document.createElement('canvas');
                canvas.width = width;
                canvas.height = height;
                layer = {
                    canvas,
                    ctx: canvas.getContext('2d'),
                    frameToken: -1,
                };
                mappingSharedSourceFrameCache.set(sourceKey, layer);
            } else if (layer.canvas.width !== width || layer.canvas.height !== height) {
                layer.canvas.width = width;
                layer.canvas.height = height;
                layer.ctx = layer.canvas.getContext('2d');
                layer.frameToken = -1;
            }

            if (layer.frameToken !== mappingRenderFrameToken) {
                layer.ctx.clearRect(0, 0, width, height);
                drawMediaCover(
                    layer.ctx,
                    media,
                    {
                        x: 0,
                        y: 0,
                        width,
                        height,
                    },
                    group.transform || {}
                );
                layer.frameToken = mappingRenderFrameToken;
                layer.mediaStateType = mediaState?.type || '';
            }

            return layer;
        }

        function drawMappingGroup(ctx, group, canvasWidth, canvasHeight) {
            const renderCache = mappingGroupRenderCache.get(group.id);
            const maskImages = renderCache?.maskImages || (group.mask_ids || []).map(maskId => mappingMaskCache.get(maskId)).filter(Boolean);
            if (!maskImages.length) return;

            const maskBounds = renderCache?.bounds || computeMaskBounds(maskImages, canvasWidth, canvasHeight);
            const sourceBounds = renderCache?.sourceBounds || maskBounds;
            let groupCanvas = renderCache?.groupCanvas;
            let groupCtx = renderCache?.groupCtx;
            const localWidth = Math.max(1, Math.round(maskBounds.width));
            const localHeight = Math.max(1, Math.round(maskBounds.height));
            const localBounds = {
                x: 0,
                y: 0,
                width: localWidth,
                height: localHeight,
            };
            if (!groupCanvas || !groupCtx) {
                groupCanvas = document.createElement('canvas');
                groupCanvas.width = localWidth;
                groupCanvas.height = localHeight;
                groupCtx = groupCanvas.getContext('2d');
                if (renderCache) {
                    renderCache.groupCanvas = groupCanvas;
                    renderCache.groupCtx = groupCtx;
                }
            } else if (groupCanvas.width !== localWidth || groupCanvas.height !== localHeight) {
                groupCanvas.width = localWidth;
                groupCanvas.height = localHeight;
            }

            const media = mappingMediaCache.get(group.id);
            const mediaState = mappingMediaState.get(group.id);
            const isStableImageGroup = Boolean(
                renderCache
                && mediaState?.type === 'image'
                && mediaState?.element
                && !mediaState?.previousElement
                && !mediaState?.transitionStart
            );

            if (isStableImageGroup) {
                const staticLayerKey = JSON.stringify({
                    source: mediaState.sources?.[mediaState.currentIndex] || '',
                    transform: group.transform || {},
                    colors: [group.color_a || '', group.color_b || ''],
                    size: [localWidth, localHeight],
                    sourceBounds,
                });

                if (!renderCache.staticLayerCanvas) {
                    renderCache.staticLayerCanvas = document.createElement('canvas');
                    renderCache.staticLayerCanvas.width = localWidth;
                    renderCache.staticLayerCanvas.height = localHeight;
                    renderCache.staticLayerCtx = renderCache.staticLayerCanvas.getContext('2d');
                } else if (renderCache.staticLayerCanvas.width !== localWidth || renderCache.staticLayerCanvas.height !== localHeight) {
                    renderCache.staticLayerCanvas.width = localWidth;
                    renderCache.staticLayerCanvas.height = localHeight;
                    renderCache.staticLayerCtx = renderCache.staticLayerCanvas.getContext('2d');
                }

                if (renderCache.staticLayerKey !== staticLayerKey) {
                    const staticCtx = renderCache.staticLayerCtx;
                    staticCtx.clearRect(0, 0, localWidth, localHeight);
                    drawMediaCover(
                        staticCtx,
                        mediaState.element,
                        {
                            x: sourceBounds.x - maskBounds.x,
                            y: sourceBounds.y - maskBounds.y,
                            width: sourceBounds.width,
                            height: sourceBounds.height,
                        },
                        group.transform || {}
                    );
                    applyLuminanceMasks(staticCtx, maskImages, localWidth, localHeight, renderCache.maskCanvas || null);
                    renderCache.staticLayerKey = staticLayerKey;
                    markMappingDirty();
                }

                ctx.drawImage(renderCache.staticLayerCanvas, maskBounds.x, maskBounds.y);
                return;
            }

            if (renderCache) {
                renderCache.staticLayerKey = '';
            }
            groupCtx.clearRect(0, 0, localWidth, localHeight);

            if (media && (media.tagName !== 'VIDEO' || media.readyState >= 2)) {
                const sharedSourceLayer = (renderCache?.sourceKey && ['animation', 'animation_list', 'video'].includes(mediaState?.type || ''))
                    ? renderSharedSourceLayer(renderCache.sourceKey, sourceBounds, media, group, mediaState)
                    : null;
                if (sharedSourceLayer && !mediaState?.previousElement) {
                    groupCtx.drawImage(
                        sharedSourceLayer.canvas,
                        Math.round(sourceBounds.x - maskBounds.x),
                        Math.round(sourceBounds.y - maskBounds.y)
                    );
                } else if (mediaState?.previousElement || mediaState?.type === 'image') {
                    drawMediaWithTransition(
                        groupCtx,
                        mediaState,
                        {
                            x: sourceBounds.x - maskBounds.x,
                            y: sourceBounds.y - maskBounds.y,
                            width: sourceBounds.width,
                            height: sourceBounds.height,
                        },
                        group.transform || {}
                    );
                } else if (mediaState?.type === 'animation') {
                    drawMediaCover(
                        groupCtx,
                        media,
                        {
                            x: sourceBounds.x - maskBounds.x,
                            y: sourceBounds.y - maskBounds.y,
                            width: sourceBounds.width,
                            height: sourceBounds.height,
                        },
                        group.transform || {}
                    );
                } else {
                    drawMediaCover(
                        groupCtx,
                        media,
                        {
                            x: sourceBounds.x - maskBounds.x,
                            y: sourceBounds.y - maskBounds.y,
                            width: sourceBounds.width,
                            height: sourceBounds.height,
                        },
                        group.transform || {}
                    );
                }
                if (media.tagName === 'VIDEO' && mediaState) {
                    if (!mediaState.lastFrameCanvas) {
                        mediaState.lastFrameCanvas = document.createElement('canvas');
                        mediaState.lastFrameCanvas.width = localWidth;
                        mediaState.lastFrameCanvas.height = localHeight;
                        mediaState.lastFrameCtx = mediaState.lastFrameCanvas.getContext('2d');
                    } else if (mediaState.lastFrameCanvas.width !== localWidth || mediaState.lastFrameCanvas.height !== localHeight) {
                        mediaState.lastFrameCanvas.width = localWidth;
                        mediaState.lastFrameCanvas.height = localHeight;
                        mediaState.lastFrameCtx = mediaState.lastFrameCanvas.getContext('2d');
                    }
                    const lastFrameCtx = mediaState.lastFrameCtx || mediaState.lastFrameCanvas.getContext('2d');
                    mediaState.lastFrameCtx = lastFrameCtx;
                    lastFrameCtx.clearRect(0, 0, localWidth, localHeight);
                    lastFrameCtx.drawImage(groupCanvas, 0, 0);
                }
            } else if (mediaState && mediaState.lastFrameCanvas) {
                groupCtx.drawImage(mediaState.lastFrameCanvas, 0, 0);
            } else {
                drawFallbackFill(groupCtx, group, localBounds);
            }

            applyLuminanceMasks(groupCtx, maskImages, localWidth, localHeight, renderCache?.maskCanvas || null);
            ctx.drawImage(groupCanvas, maskBounds.x, maskBounds.y);
        }

        function computeMaskBounds(maskImages, width, height) {
            let minX = width;
            let minY = height;
            let maxX = 0;
            let maxY = 0;
            maskImages.forEach((image) => {
                const offscreen = document.createElement('canvas');
                offscreen.width = width;
                offscreen.height = height;
                const offscreenCtx = offscreen.getContext('2d', { willReadFrequently: true });
                offscreenCtx.drawImage(image, 0, 0, width, height);
                const { data } = offscreenCtx.getImageData(0, 0, width, height);
                for (let y = 0; y < height; y++) {
                    for (let x = 0; x < width; x++) {
                        const idx = (y * width + x) * 4;
                        const alpha = data[idx + 3];
                        const lum = (data[idx] + data[idx + 1] + data[idx + 2]) / 3;
                        if (alpha > 5 && lum > 127) {
                            minX = Math.min(minX, x);
                            minY = Math.min(minY, y);
                            maxX = Math.max(maxX, x);
                            maxY = Math.max(maxY, y);
                        }
                    }
                }
            });
            return {
                x: minX,
                y: minY,
                width: Math.max(1, maxX - minX + 1),
                height: Math.max(1, maxY - minY + 1)
            };
        }

        function drawMediaCover(ctx, media, bounds, transform) {
            const sourceWidth = media.videoWidth || media.naturalWidth || media.width || bounds.width;
            const sourceHeight = media.videoHeight || media.naturalHeight || media.height || bounds.height;
            const scale = Math.max(bounds.width / sourceWidth, bounds.height / sourceHeight) * (transform.scale || 1);
            const width = sourceWidth * scale;
            const height = sourceHeight * scale;
            const x = bounds.x + ((bounds.width - width) / 2) + (transform.offset_x || 0);
            const y = bounds.y + ((bounds.height - height) / 2) + (transform.offset_y || 0);
            ctx.drawImage(media, x, y, width, height);
        }

        function drawFallbackFill(ctx, group, bounds) {
            const gradient = ctx.createLinearGradient(bounds.x, bounds.y, bounds.x + bounds.width, bounds.y + bounds.height);
            gradient.addColorStop(0, group.color_a || '#00bbf9');
            gradient.addColorStop(1, group.color_b || '#003049');
            ctx.fillStyle = gradient;
            ctx.fillRect(bounds.x, bounds.y, bounds.width, bounds.height);
        }

        function applyLuminanceMasks(ctx, maskImages, width, height, precomputedMaskCanvas = null) {
            const maskCanvas = precomputedMaskCanvas || buildCombinedMaskCanvas(maskImages, width, height);
            ctx.globalCompositeOperation = 'destination-in';
            ctx.drawImage(maskCanvas, 0, 0);
            ctx.globalCompositeOperation = 'source-over';
        }

        function drawImageMediaWithTransition(ctx, mediaState, bounds, transform) {
            drawMediaWithTransition(ctx, mediaState, bounds, transform);
        }

        function startDrag(e) {
            if (e.target.classList.contains('widget-handle')) return;
            
            isDragging = true;
            currentWidget = e.currentTarget;
            currentWidget.classList.add('dragging');
            
            const rect = currentWidget.getBoundingClientRect();
            dragOffset.x = e.clientX - rect.left;
            dragOffset.y = e.clientY - rect.top;
            
            selectWidget(currentWidget.id);
            e.preventDefault();
        }
        
        function startResize(e) {
            e.stopPropagation();
            isResizing = true;
            currentWidget = e.target.parentElement;
            
            const rect = currentWidget.getBoundingClientRect();
            resizeStart = {
                width: rect.width,
                height: rect.height,
                x: e.clientX,
                y: e.clientY
            };
            
            e.preventDefault();
        }
        
        function startRotate(e) {
            e.stopPropagation();
            isRotating = true;
            currentWidget = e.target.parentElement;
            
            const rect = currentWidget.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            
            // Get current rotation
            const widget = widgets.find(w => w.id === currentWidget.id);
            const currentRotation = widget.rotation || 0;
            
            // Calculate initial mouse angle
            const mouseAngle = Math.atan2(e.clientY - centerY, e.clientX - centerX) * 180 / Math.PI;
            
            rotateStart = {
                angle: currentRotation,
                mouseAngle: mouseAngle
            };
            
            e.preventDefault();
        }
        
        document.addEventListener('mousemove', (e) => {
            if (isDragging && currentWidget) {
                const x = e.clientX - dragOffset.x;
                const y = e.clientY - dragOffset.y;
                const widget = getWidget(currentWidget.id);
                if (widget) {
                    widget.position.x = x;
                    widget.position.y = y;
                    scheduleWidgetLayout(widget.id);
                }
            } else if (isResizing && currentWidget) {
                const deltaX = e.clientX - resizeStart.x;
                const deltaY = e.clientY - resizeStart.y;
                
                const newWidth = Math.max(200, resizeStart.width + deltaX);
                const newHeight = Math.max(100, resizeStart.height + deltaY);
                const widget = getWidget(currentWidget.id);
                if (widget) {
                    widget.size.width = newWidth;
                    widget.size.height = newHeight;
                    scheduleWidgetLayout(widget.id, true);
                }
            } else if (isRotating && currentWidget) {
                const rect = currentWidget.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;
                
                // Calculate current mouse angle
                const currentMouseAngle = Math.atan2(e.clientY - centerY, e.clientX - centerX) * 180 / Math.PI;
                
                // Calculate rotation delta
                const angleDelta = currentMouseAngle - rotateStart.mouseAngle;
                let newRotation = rotateStart.angle + angleDelta;
                
                // Normalize angle to 0-360
                newRotation = ((newRotation % 360) + 360) % 360;
                
                const widget = getWidget(currentWidget.id);
                if (widget) {
                    widget.rotation = newRotation;
                    scheduleWidgetLayout(widget.id);
                }
            }
        });
        
        document.addEventListener('mouseup', () => {
            if (currentWidget) {
                currentWidget.classList.remove('dragging');
            }
            isDragging = false;
            isResizing = false;
            isRotating = false;

                        rotationDelta = -5;
                    } else if (e.key === 'ArrowRight') {
                        rotationDelta = 5;
                    }
                    
                    if (rotationDelta !== 0) {
                        e.preventDefault();
                        widget.rotation = ((widget.rotation || 0) + rotationDelta + 360) % 360;
                        const widgetEl = document.getElementById(widget.id);

        function startOverlayStatusPolling() {
            let lastSyncEventId = null;
