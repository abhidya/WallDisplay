<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HDMI Projector Identify</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #050505;
      color: #f7f5ef;
      font-family: Arial, Helvetica, sans-serif;
    }
    .frame {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      background:
        linear-gradient(90deg, rgba(255,255,255,0.13) 1px, transparent 1px),
        linear-gradient(0deg, rgba(255,255,255,0.13) 1px, transparent 1px),
        radial-gradient(circle at center, #22252c, #050505 70%);
      background-size: 80px 80px, 80px 80px, 100% 100%;
    }
    .frame::before {
      content: "";
      position: fixed;
      inset: 16px;
      border: 10px solid #ffffff;
      box-shadow: inset 0 0 0 4px #050505;
    }
    .label {
      position: relative;
      text-align: center;
      padding: 32px 48px;
      background: rgba(0, 0, 0, 0.72);
      border: 2px solid rgba(255, 255, 255, 0.82);
      max-width: min(900px, 82vw);
    }
    .eyebrow {
      margin-bottom: 20px;
      color: #8bd9ff;
      font-size: clamp(18px, 2vw, 28px);
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }
    h1 {
      margin: 0;
      font-size: clamp(46px, 9vw, 124px);
      line-height: 0.94;
      font-weight: 800;
    }
    .detail {
      margin-top: 22px;
      color: #f7f5ef;
      font-size: clamp(18px, 2.2vw, 32px);
    }
    .corner {
      position: absolute;
      width: 12vw;
      height: 12vw;
      max-width: 180px;
      max-height: 180px;
      border-color: #fffb8c;
      border-style: solid;
      pointer-events: none;
    }
    .tl { left: 28px; top: 28px; border-width: 8px 0 0 8px; }
    .tr { right: 28px; top: 28px; border-width: 8px 8px 0 0; }
    .bl { left: 28px; bottom: 28px; border-width: 0 0 8px 8px; }
    .br { right: 28px; bottom: 28px; border-width: 0 8px 8px 0; }
  </style>
</head>
<body>
  <main class="frame">
    <section class="label">
      <div class="eyebrow">HDMI projector target</div>
      <h1 id="projector">Projector</h1>
      <div class="detail">If this fills the projector, the selected display is correct.</div>
    </section>
  </main>
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const projectorId = params.get('projector_id') || 'projector';
    document.getElementById('projector').textContent = projectorId;

    async function heartbeat() {
      try {
        await fetch(`/api/renderer/heartbeat/${encodeURIComponent(projectorId)}`, { method: 'POST', keepalive: true });
      } catch (error) {
        // Keep the pattern on screen even when the API is temporarily unavailable.
      }
    }
    heartbeat();
    setInterval(heartbeat, 5000);
  </script>
</body>
</html>
